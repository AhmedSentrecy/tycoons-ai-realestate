/* ============================================================
   TYCOONS INVESTMENTS — COLOR TOKENS
   Light marketplace-premium palette: warm off-white canvas,
   white surfaces, deep navy ink, gold accent, WhatsApp green.
   ============================================================ */

:root {
  /* ---- Brand core ---- */
  --navy: #101827;          /* primary ink / buttons / brand */
  --navy-700: #1b2638;      /* hover on navy */
  --navy-600: #1d2a40;      /* gradient pair for primary button */
  --gold: #b88939;          /* primary accent — eyebrows, links, CTAs */
  --gold-deep: #a8822f;     /* gold used on light tints (guide panels) */
  --gold-bright: #c49a4a;   /* logo monogram accent */
  --gold-light: #d2aa62;    /* gold gradient pair */
  --gold-soft: #f1dfb6;     /* soft gold border / fill */

  /* ---- WhatsApp (conversion) ---- */
  --wa: #20b15a;            /* primary WhatsApp green */
  --wa-deep: #1faf5a;

  /* ---- Neutrals / ink ---- */
  --ink: #121722;           /* default text on light */
  --muted: #657080;         /* secondary text */
  --faint: #99a1ad;         /* tertiary / placeholder text */
  --slate: #5b6473;         /* guide-panel body ink */

  /* ---- Surfaces ---- */
  --bg: #f4f5f7;            /* page canvas */
  --surface: #ffffff;       /* cards, header */
  --surface-soft: #f8f9fb;  /* inset fields, soft chips */
  --surface-warm: #fbf7ef;  /* warm gold-tinted surface */

  /* ---- Lines / borders ---- */
  --line: #e4e7ec;
  --line-strong: #d4d9e1;
  --line-gold: #f0dfbf;     /* gold-tinted border on warm surfaces */

  /* ---- Semantic status ---- */
  --green: #24845f;         /* success ink */
  --green-bg: #ecf8f1;
  --green-border: #cdeedc;
  --red: #b5473c;           /* error ink */
  --red-bg: #fff1ef;
  --red-border: #f2cdc8;
  --warn-bg: #fff7e5;       /* pending / info */
  --warn-ink: #7a5a21;
  --warn-border: #f0dfb8;

  /* ============================================================
     SEMANTIC ALIASES — prefer these in component CSS
     ============================================================ */
  --text-strong: var(--navy);
  --text-body: var(--ink);
  --text-muted: var(--muted);
  --text-faint: var(--faint);
  --text-accent: var(--gold);

  --surface-page: var(--bg);
  --surface-card: var(--surface);
  --surface-inset: var(--surface-soft);
  --surface-accent: var(--surface-warm);

  --border-default: var(--line);
  --border-strong: var(--line-strong);
  --border-accent: var(--line-gold);

  --accent: var(--gold);
  --accent-contrast: #ffffff;

  /* ---- Page background wash (radial gold glow + vertical fade) ---- */
  --bg-wash:
    radial-gradient(circle at 16% 0%, rgba(184,137,57,.12), transparent 34%),
    linear-gradient(180deg, #f7f8fa 0%, #f2f3f5 100%);
}

/* ============================================================
   TYCOONS INVESTMENTS — TYPOGRAPHY TOKENS
   Display/UI: Sora. Body: Inter. Arabic: IBM Plex Sans Arabic.
   Wordmark: Georgia serif (logo only).
   Headings are tightly tracked; eyebrows are upper-tracked gold.
   ============================================================ */

:root {
  /* ---- Families ---- */
  --font-display: 'Sora', system-ui, sans-serif;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-arabic: 'IBM Plex Sans Arabic', 'Inter', system-ui, sans-serif;
  --font-serif: Georgia, 'Times New Roman', serif;  /* wordmark */
  --font-mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;

  /* ---- Weights ---- */
  --fw-regular: 400;   /* @kind other */
  --fw-medium: 500;    /* @kind other */
  --fw-semibold: 600;  /* @kind other */
  --fw-bold: 700;      /* @kind other */
  --fw-black: 800;     /* @kind other */
  --fw-heavy: 900;     /* @kind other */

  /* ---- Type scale (px) ---- */
  --fs-display: clamp(38px, 5vw, 66px);  /* @kind font */
  --fs-h2: clamp(25px, 3vw, 38px);       /* @kind font */
  --fs-h3: 19px;       /* @kind font */
  --fs-title: 24px;    /* @kind font */
  --fs-lg: 18px;       /* @kind font */
  --fs-body: 16px;     /* @kind font */
  --fs-sm: 14px;       /* @kind font */
  --fs-xs: 13px;       /* @kind font */
  --fs-2xs: 12px;      /* @kind font */
  --fs-eyebrow: 12px;  /* @kind font */

  /* ---- Line heights ---- */
  --lh-display: 0.98;  /* @kind other */
  --lh-heading: 1.05;  /* @kind other */
  --lh-snug: 1.25;     /* @kind other */
  --lh-body: 1.65;     /* @kind other */

  /* ---- Letter spacing ---- */
  --ls-display: -0.055em;  /* @kind other */
  --ls-h2: -0.035em;       /* @kind other */
  --ls-tight: -0.02em;     /* @kind other */
  --ls-eyebrow: 0.11em;    /* @kind other */
  --ls-label: 0.08em;      /* @kind other */

  /* ---- Semantic text aliases ---- */
  --text-eyebrow-transform: uppercase;
}

/* ============================================================
   TYCOONS INVESTMENTS — SPACING & LAYOUT TOKENS
   8px-ish rhythm with a few in-between steps the site uses.
   ============================================================ */

:root {
  --space-0: 0;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-7: 28px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 46px;
  --space-16: 64px;

  /* ---- Layout containers ---- */
  --container: 1240px;        /* main content max width */
  --container-narrow: 1040px; /* static / article pages */
  --gutter: 32px;             /* min side gutter (uses calc(100% - 32px)) */
  --header-height: 72px;

  /* ---- Section rhythm ---- */
  --section-pad-y: 28px;
  --hero-pad-y: 46px;
  --card-pad: 17px;
  --panel-pad: 24px;
}

/* ============================================================
   TYCOONS INVESTMENTS — EFFECTS TOKENS
   Soft elevation, generous radii, pill shapes, glass header,
   focus ring, and standard motion timing.
   ============================================================ */

:root {
  /* ---- Radii ---- */
  --radius-xs: 8px;
  --radius-sm: 12px;
  --radius: 18px;        /* default card radius */
  --radius-lg: 22px;
  --radius-xl: 26px;
  --radius-2xl: 28px;
  --radius-pill: 999px;  /* buttons, chips, tags, nav links */

  /* ---- Shadows (cool navy-tinted, never black) ---- */
  --shadow-sm: 0 2px 10px rgba(16,24,39,.06);
  --shadow-md: 0 14px 34px rgba(16,24,39,.10);
  --shadow-lg: 0 30px 80px rgba(16,24,39,.32);
  --shadow-primary: 0 12px 24px rgba(16,24,39,.16);   /* navy button */
  --shadow-wa: 0 10px 22px rgba(32,177,90,.16);       /* whatsapp button */
  --shadow-gold: 0 8px 18px rgba(184,137,57,.22);     /* gold pill */

  /* ---- Borders ---- */
  --border-width: 1px;

  /* ---- Focus ring (gold) ---- */
  --focus-ring: 0 0 0 4px rgba(184,137,57,.10);
  --focus-border: rgba(184,137,57,.65);

  /* ---- Glass header ---- */
  --glass-bg: rgba(255,255,255,.64);
  --glass-blur: blur(22px) saturate(1.15);  /* @kind other */
  --glass-border: rgba(228,231,236,.55);

  /* ---- Image protection gradient (bottom-fade on photos) ---- */
  --img-scrim: linear-gradient(180deg, rgba(0,0,0,0) 48%, rgba(0,0,0,.48) 100%);  /* @kind other */

  /* ---- Motion ---- */
  --ease: cubic-bezier(.4,0,.2,1);  /* @kind other */
  --dur-fast: .16s;  /* @kind other */
  --dur: .22s;  /* @kind other */
  --dur-slow: .35s;  /* @kind other */
  --lift: translateY(-1px);   /* @kind other */
  --lift-card: translateY(-3px); /* @kind other */
}

/* ============================================================
   TYCOONS INVESTMENTS — BASE / RESET
   Minimal element defaults so specimen cards and kits inherit
   the brand canvas, type, and rhythm without extra setup.
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  margin: 0;
  background: var(--bg-wash);
  color: var(--text-body);
  font-family: var(--font-body);
  font-size: var(--fs-body);
  line-height: var(--lh-body);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* Arabic / RTL */
[dir="rtl"] body,
body[dir="rtl"] { font-family: var(--font-arabic); }

a { color: inherit; text-decoration: none; }
button, input, textarea, select { font: inherit; }
img { max-width: 100%; display: block; }

h1, h2, h3, p { margin-top: 0; }

h1 {
  font-family: var(--font-display);
  color: var(--text-strong);
  font-size: var(--fs-display);
  line-height: var(--lh-display);
  letter-spacing: var(--ls-display);
  font-weight: var(--fw-black);
}
h2 {
  font-family: var(--font-display);
  color: var(--text-strong);
  font-size: var(--fs-h2);
  line-height: var(--lh-heading);
  letter-spacing: var(--ls-h2);
  font-weight: var(--fw-bold);
}
h3 {
  font-family: var(--font-display);
  color: var(--text-strong);
  font-size: var(--fs-h3);
  line-height: var(--lh-snug);
  letter-spacing: var(--ls-tight);
  font-weight: var(--fw-bold);
}
p { color: var(--text-muted); line-height: var(--lh-body); }

/* ---- Eyebrow: the brand's signature gold kicker ---- */
.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  color: var(--text-accent);
  font-family: var(--font-display);
  font-size: var(--fs-eyebrow);
  font-weight: var(--fw-heavy);
  letter-spacing: var(--ls-eyebrow);
  text-transform: uppercase;
}
.eyebrow::before {
  content: "";
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: currentColor;
}

</style>
<style>
  body { margin: 0; background: var(--bg-wash); min-height: 100vh; overflow-x: hidden; }
  * { box-sizing: border-box; }
  a { color: var(--gold); }
  a:hover { color: var(--gold-deep); }

  /* keyframes referenced from inline styles */
  @keyframes tcRing { 0% { opacity: .7; transform: scale(1); } 100% { opacity: 0; transform: scale(1.7); } }
  @keyframes tcEq { 0%,100% { height: 22%; } 50% { height: 96%; } }
  @keyframes tcBlink { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
  @keyframes tcRise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  @keyframes tcFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes tcPulse { 0% { box-shadow: 0 0 0 0 rgba(32,177,90,.4); } 70% { box-shadow: 0 0 0 12px rgba(32,177,90,0); } 100% { box-shadow: 0 0 0 0 rgba(32,177,90,0); } }
  @keyframes tcSpark { 0%,100% { opacity: .55; transform: scale(.8); } 50% { opacity: 1; transform: scale(1.2); } }
  @keyframes tcDots { 0%,80%,100% { transform: scale(.5); opacity: .4; } 40% { transform: scale(1); opacity: 1; } }

  /* thinking dots */
  .tc-dots { display: inline-flex; gap: 4px; }
  .tc-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); animation: tcDots 1.2s var(--ease) infinite; }
  .tc-dots span:nth-child(2) { animation-delay: .18s; }
  .tc-dots span:nth-child(3) { animation-delay: .36s; }

  /* hide scrollbars on the conversation rail + body */
  .tc-rail { scrollbar-width: thin; scrollbar-color: rgba(184,137,57,.4) transparent; }
  .tc-rail::-webkit-scrollbar { height: 7px; }
  .tc-rail::-webkit-scrollbar-thumb { background: rgba(184,137,57,.4); border-radius: 999px; }
  .tc-scroll::-webkit-scrollbar { width: 7px; }
  .tc-scroll::-webkit-scrollbar-thumb { background: rgba(184,137,57,.3); border-radius: 999px; }

  /* responsive */
  @media (max-width: 900px) {
    .tc-launch-spot { grid-template-columns: 1fr !important; }
    .tc-calc { grid-template-columns: 1fr !important; }
    .tc-proj-head { grid-template-columns: 1fr !important; }
    .tc-foot { grid-template-columns: 1fr 1fr !important; }
  }
  @media (max-width: 760px) {
    .tc-nav { display: none !important; }
    .tc-facts { grid-template-columns: 1fr 1fr !important; }
  }
  @media (max-width: 480px) {
    .tc-foot { grid-template-columns: 1fr !important; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; }
  }
</style>
