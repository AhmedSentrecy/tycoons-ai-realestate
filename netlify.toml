[build]
  command = "node scripts/generate-pages.js"
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/ai-search"
  to = "/.netlify/functions/ai-search"
  status = 200

[[redirects]]
  from = "/api/admin-inventory"
  to = "/.netlify/functions/admin-inventory"
  status = 200

[[redirects]]
  from = "/api/announce-new-launches"
  to = "/.netlify/functions/announce-new-launches"
  status = 200
