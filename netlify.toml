[build]
  command = "python3 patch_tycoons_build.py"
  publish = "."

[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200

# /ar and /en serve the directory directly (no 301 hop — prevents redirect loops)
[[redirects]]
  from = "/ar"
  to = "/.netlify/functions/seo-page?route=ar/home"
  status = 200

[[redirects]]
  from = "/en"
  to = "/.netlify/functions/seo-page?route=en/home"
  status = 200

[[redirects]]
  from = "/ar/"
  to = "/.netlify/functions/seo-page?route=ar/home"
  status = 200

[[redirects]]
  from = "/en/"
  to = "/.netlify/functions/seo-page?route=en/home"
  status = 200

[[redirects]]
  from = "/ar/projects/*"
  to = "/.netlify/functions/seo-page?route=ar/project/:splat"
  status = 200

[[redirects]]
  from = "/en/projects/*"
  to = "/.netlify/functions/seo-page?route=en/project/:splat"
  status = 200

[[redirects]]
  from = "/ar/areas/*"
  to = "/.netlify/functions/seo-page?route=ar/area/:splat"
  status = 200

[[redirects]]
  from = "/en/areas/*"
  to = "/.netlify/functions/seo-page?route=en/area/:splat"
  status = 200

[[redirects]]
  from = "/ar/developers/*"
  to = "/.netlify/functions/seo-page?route=ar/developer/:splat"
  status = 200

[[redirects]]
  from = "/en/developers/*"
  to = "/.netlify/functions/seo-page?route=en/developer/:splat"
  status = 200
